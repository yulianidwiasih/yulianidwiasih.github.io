<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Sederhana Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #e0ecff, #f8fbff);
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        border: none;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      .card-title {
        font-weight: 700;
        color: #0d6efd;
      }

      .password-wrapper {
        position: relative;
      }

      .toggle-password {
        position: absolute;
        top: 50%;
        right: 15px;
        transform: translateY(-50%);
        cursor: pointer;
        color: #6c757d;
        font-size: 1.2rem;
      }

      .toggle-password:hover {
        color: #0d6efd;
      }

      .form-control {
        border-radius: 12px;
        padding: 12px 40px 12px 12px;
      }

      .btn-login {
        border-radius: 12px;
        padding: 10px;
        font-weight: 600;
      }

      .attempt-text {
        font-size: 0.95rem;
        color: #6c757d;
      }
    </style>
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="card login-card p-4">
        <div class="card-body">
          <div class="text-center mb-4">
            <i class="bi bi-person-circle fs-1 text-primary"></i>
            <h2 class="card-title mt-2">Login</h2>
            <p class="text-muted mb-0">
              Silakan masukkan username dan password
            </p>
          </div>

          <div id="alertBox"></div>

          <div class="mb-3">
            <label for="username" class="form-label fw-semibold"
              >Username</label
            >
            <input
              type="text"
              id="username"
              class="form-control"
              placeholder="Masukkan username"
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label fw-semibold"
              >Password</label
            >
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Masukkan password"
              />
              <i
                class="bi bi-eye toggle-password"
                id="toggleIcon"
                onclick="togglePassword()"
              ></i>
            </div>
          </div>

          <button
            class="btn btn-primary w-100 btn-login"
            id="loginBtn"
            onclick="login()"
          >
            Login
          </button>

          <p class="text-center mt-3 mb-0 attempt-text" id="sisaPercobaan">
            Sisa percobaan: 3
          </p>
        </div>
      </div>
    </div>

    <script>
      const usernameBenar = "admin";
      const passwordBenar = "12345";

      let percobaan = 0;
      const maksimalPercobaan = 3;

      function tampilkanPesan(pesan, tipe) {
        const alertBox = document.getElementById("alertBox");
        alertBox.innerHTML = `
        <div class="alert alert-${tipe} alert-dismissible fade show" role="alert">
          ${pesan}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
      }

      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const toggleIcon = document.getElementById("toggleIcon");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          toggleIcon.classList.remove("bi-eye");
          toggleIcon.classList.add("bi-eye-slash");
        } else {
          passwordInput.type = "password";
          toggleIcon.classList.remove("bi-eye-slash");
          toggleIcon.classList.add("bi-eye");
        }
      }

      function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const sisaPercobaan = document.getElementById("sisaPercobaan");
        const loginBtn = document.getElementById("loginBtn");

        if (percobaan >= maksimalPercobaan) {
          tampilkanPesan("Login diblokir karena telah 3 kali gagal.", "danger");
          loginBtn.disabled = true;
          return;
        }

        if (username === "" && password === "") {
          tampilkanPesan("Username dan password harus diisi.", "warning");
          return;
        }

        if (username === "") {
          tampilkanPesan("Username tidak boleh kosong.", "warning");
          return;
        }

        if (password === "") {
          tampilkanPesan("Password tidak boleh kosong.", "warning");
          return;
        }

        if (username === usernameBenar && password === passwordBenar) {
          tampilkanPesan("Login berhasil.", "success");
          loginBtn.disabled = true;
        } else {
          percobaan++;
          let sisa = maksimalPercobaan - percobaan;

          if (username !== usernameBenar) {
            tampilkanPesan("Username salah.", "danger");
          } else if (password !== passwordBenar) {
            tampilkanPesan("Password salah.", "danger");
          }

          sisaPercobaan.textContent = "Sisa percobaan: " + sisa;

          if (percobaan >= maksimalPercobaan) {
            tampilkanPesan(
              "Login diblokir karena telah 3 kali gagal.",
              "danger",
            );
            loginBtn.disabled = true;
          }
        }
      }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
